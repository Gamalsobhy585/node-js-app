services:
  node-app:
    container_name: express-node-app-container
    build:
      context: .
    volumes:
      - ./src:/app/src:ro
      - /app/node_modules
    ports:
      - "4000:4000"
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

